<!DOCTYPE html>
<html>
<body>

<h2>Convertidor CSV a JS</h2>

<input type="file" id="archivo">

<pre id="resultado"></pre>

<script>
document.getElementById("archivo").addEventListener("change", function(event) {

    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {

        const texto = e.target.result.trim();
        const lineas = texto.split("\n");
        lineas.shift(); // elimina encabezado

        let salida = "let maquinas = [\n";

        lineas.forEach(linea => {
            const columnas = linea.split(",");
            salida += `    { numero: ${columnas[0]}, locacion: "${columnas[1]}" },\n`;
        });

        salida += "];";

        document.getElementById("resultado").textContent = salida;
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
