<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Buscador de Máquinas</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="./style.css">

</head>

<body>

<div class="contenedor">

    <img src="./img/logo.jpeg" alt="logo" class="logo-img">

    <h1>Buscador de Máquinas</h1>

    <!-- BUSCADOR -->
    <form id="formBuscador" onsubmit="return false;">
        <input id="valorBusqueda" type="text" placeholder="Maquina, locación, zona, K22" autocomplete="off">
        <button id="btnBuscar" class="button-buscar">Buscar</button>
        <button onclick="nuevaBusqueda()" class="btn-nueva">
            Nueva búsqueda
        </button>
    </form>

    <div id="resultado"></div>



</div>



    <!-- RESULTADOS -->
    <div id="resultado"></div>

    <!-- VISOR DE PLANO -->
    <div id="plano"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
